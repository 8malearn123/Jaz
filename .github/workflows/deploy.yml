name: Deploy to Vercel

# Builds the app on the GitHub runner and uploads the prebuilt output to Vercel
# (bypassing Vercel's stuck build queue entirely). Runs on every push to main
# and on demand. Requires the VERCEL_TOKEN repository secret; the project is
# linked by name below.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_PROJECT_NAME: jaz-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret not set — skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: 20
      - name: Install Vercel CLI
        if: env.SKIP != '1'
        run: npm install -g vercel
      # The token may cover several Vercel scopes (personal account + teams), and the
      # CLI refuses to auto-pick one when non-interactive. Find which scope actually
      # owns the project via the REST API, then link with an explicit --scope.
      - name: Find project scope
        if: env.SKIP != '1'
        run: |
          AUTH="Authorization: Bearer $VERCEL_TOKEN"
          SCOPE=""
          if curl -sf -H "$AUTH" "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_NAME" > /dev/null; then
            SCOPE=$(curl -s -H "$AUTH" "https://api.vercel.com/v2/user" | jq -r '.user.username')
          else
            TEAMS=$(curl -s -H "$AUTH" "https://api.vercel.com/v2/teams?limit=100")
            for row in $(echo "$TEAMS" | jq -r '.teams[] | "\(.id),\(.slug)"'); do
              id=${row%%,*}; slug=${row##*,}
              if curl -sf -H "$AUTH" "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_NAME?teamId=$id" > /dev/null; then
                SCOPE=$slug; break
              fi
            done
          fi
          if [ -z "$SCOPE" ]; then
            echo "Project '$VERCEL_PROJECT_NAME' was not found in any scope this token can access." >&2
            exit 1
          fi
          echo "Project '$VERCEL_PROJECT_NAME' found in scope '$SCOPE'."
          echo "VERCEL_SCOPE=$SCOPE" >> "$GITHUB_ENV"
      - name: Link project
        if: env.SKIP != '1'
        run: vercel link --yes --project "$VERCEL_PROJECT_NAME" --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
      - name: Pull project settings
        if: env.SKIP != '1'
        run: vercel pull --yes --environment=production --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
      - name: Build locally
        if: env.SKIP != '1'
        run: vercel build --prod --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        if: env.SKIP != '1'
        run: vercel deploy --prebuilt --prod --scope "$VERCEL_SCOPE" --token "$VERCEL_TOKEN"
