name: Deploy to Vercel

# Builds the app on the GitHub runner and uploads the prebuilt output to Vercel
# (bypassing Vercel's stuck build queue entirely). Runs on every push to main
# and on demand. Requires the VERCEL_TOKEN repository secret; the project is
# linked by name below.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_PROJECT_NAME: jaz-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret not set — skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: 20
      - name: Install Vercel CLI
        if: env.SKIP != '1'
        run: npm install -g vercel
      # 'vercel link' can't pick a scope non-interactively (multiple teams), and the
      # CLI rejects a personal account passed via --scope. So skip linking entirely:
      # find the project through the REST API (personal scope first, then each team)
      # and write .vercel/project.json ourselves — pull/build/deploy just use it.
      - name: Locate project
        if: env.SKIP != '1'
        run: |
          AUTH="Authorization: Bearer $VERCEL_TOKEN"
          INFO=$(curl -sf -H "$AUTH" "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_NAME" || true)
          if [ -z "$INFO" ]; then
            for id in $(curl -s -H "$AUTH" "https://api.vercel.com/v2/teams?limit=100" | jq -r '.teams[].id'); do
              INFO=$(curl -sf -H "$AUTH" "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_NAME?teamId=$id" || true)
              [ -n "$INFO" ] && break
            done
          fi
          if [ -z "$INFO" ]; then
            echo "Project '$VERCEL_PROJECT_NAME' was not found in any scope this token can access." >&2
            exit 1
          fi
          PROJECT_ID=$(echo "$INFO" | jq -r '.id')
          ORG_ID=$(echo "$INFO" | jq -r '.accountId')
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJECT_ID" "$ORG_ID" > .vercel/project.json
          echo "Project '$VERCEL_PROJECT_NAME' → $PROJECT_ID (org $ORG_ID)."
      - name: Pull project settings
        if: env.SKIP != '1'
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
      - name: Build locally
        if: env.SKIP != '1'
        run: vercel build --prod --token "$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        if: env.SKIP != '1'
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
